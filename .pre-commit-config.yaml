repos:
  - repo: local
    hooks:
      - id: ensure-script-executable
        name: Ensure commit-msg script is executable
        entry: bash -c 'chmod +x .github/scripts/check-commit-msg.sh'
        language: system
        files: ^\.github/scripts/check-commit-msg\.sh$
        pass_filenames: false
  - repo: local
    hooks:
      - id: commit-message-check
        name: Check commit message formatting
        entry: .github/scripts/check-commit-msg.sh
        language: script
        stages: [commit-msg]

  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.0.0
    hooks:
      - id: mypy
        additional_dependencies: [pydantic]
        files: ^src/
