name: Publish to PyPI and Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pypi-publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi-publish
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build tools
        run: pip install build
      - name: Build package
        run: python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true

  github-release:
    runs-on: ubuntu-latest
    needs: pypi-publish
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate changelog
        id: changelog
        run: |
          CURRENT_TAG=${GITHUB_REF#refs/tags/}
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 $CURRENT_TAG^ 2>/dev/null || echo "")
          EXCLUDE_PATTERN="^[A-Z]+-[0-9]+:[[:space:]]*(chore|docs|typo|test|style|refactor|ci|build|revert)(\([^)]*\))?:|^[[:space:]]*(chore|docs|typo|test|style|refactor|ci|build|revert)(\([^)]*\))?:"
          if [ -z "$PREVIOUS_TAG" ]; then
            RAW_CHANGELOG=$(git log --no-merges --pretty=format:"- %s" | grep -v -E "$EXCLUDE_PATTERN" || true)
          else
            RAW_CHANGELOG=$(git log --no-merges --pretty=format:"- %s" $PREVIOUS_TAG..$CURRENT_TAG | grep -v -E "$EXCLUDE_PATTERN" || true)
          fi
          if [ -z "$RAW_CHANGELOG" ]; then
            RAW_CHANGELOG="- No notable changes in this release"
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$RAW_CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.changelog }}
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          prerelease: contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha')

  sync-back:
    runs-on: ubuntu-latest
    needs: github-release
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      - name: Create PR to dev
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: dev
          branch: sync/main-to-dev
          title: "chore: sync main (hotfix) to dev"
          body: |
            This PR automatically syncs changes from `main` (following the release tag ${{ github.ref_name }}) back to `dev`.

            Please review and merge to ensure the hotfix is included in future releases.
          delete-branch: true
          labels: automated, sync
      - name: Create PR to staging
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: staging
          branch: sync/main-to-staging
          title: "chore: sync main (hotfix) to staging"
          body: |
            This PR automatically syncs changes from `main` (following the release tag ${{ github.ref_name }}) back to `staging`.

            Please review and merge to keep staging aligned with production.
          delete-branch: true
          labels: automated, sync
